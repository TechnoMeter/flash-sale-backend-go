name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          
      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod tidy && git diff --exit-code

      - name: Build
        run: go build -v ./...

      - name: Test (skip integration)
        run: go test -v -short ./...